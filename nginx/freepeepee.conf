# Inside the docker network. Your HOST nginx terminates TLS and proxies to 127.0.0.1:8081.
upstream fp_api { server api:8080; }
upstream fp_web { server web:80; }

server {
    listen 80;
    server_name _;
    client_max_body_size 2m;

    # Hardening headers - HSTS is set by host nginx that owns TLS
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(self)" always;

    # Forward real client IP / proto - both populated by host nginx
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $http_x_real_ip;
    proxy_set_header X-Forwarded-For   $http_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Request-Id      $http_x_request_id;

    location /api/ {
        proxy_pass http://fp_api;
        proxy_read_timeout 30s;
    }
    location /actuator/health {
        proxy_pass http://fp_api/actuator/health;
    }
    location / {
        proxy_pass http://fp_web;
    }
}

# /etc/nginx/sites-available/freepeepee.matvs.dev
# (Your existing host nginx, NOT the one inside compose.)
# Assumes certbot for TLS. The actual freepeepee stack listens on 127.0.0.1:8081.

server {
    listen 80;
    listen [::]:80;
    server_name freepeepee.matvs.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name freepeepee.matvs.dev;

    ssl_certificate     /etc/letsencrypt/live/freepeepee.matvs.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freepeepee.matvs.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
    }
}

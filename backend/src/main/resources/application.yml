spring:
  application:
    name: freepeepee
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freepeepee}
    username: ${DB_USER:freepeepee}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never

freepeepee:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_in_production_at_least_32_bytes_random_blob_xxxxxxxx}
    issuer: freepeepee
    access-ttl-minutes: 30
    refresh-ttl-days: 14
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  admin:
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    dev.matvs: DEBUG
    org.hibernate.SQL: WARN
